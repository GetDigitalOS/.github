name: Deploy to Railway

on:
  workflow_call:
    inputs:
      service-name:
        description: "Railway service name"
        required: true
        type: string
      project-id:
        description: "Railway project ID. Set this to deploy with a workspace-scoped RAILWAY_TOKEN; leave empty to use a project-scoped token (legacy)."
        required: false
        default: ""
        type: string
      environment:
        description: "Railway environment (only used when project-id is set)"
        required: false
        default: "production"
        type: string
      node-version:
        description: "Node.js version"
        required: false
        default: "22"
        type: string
      package-manager:
        description: "Package manager: npm or pnpm"
        required: false
        default: "npm"
        type: string
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        required: false
        default: "10"
        type: string
      run-tests:
        description: "Run tests before deploy"
        required: false
        default: true
        type: boolean
      test-command:
        description: "Test command"
        required: false
        default: "npm test"
        type: string
      wait-for-deploy:
        description: "Wait for the Railway deployment to reach a terminal state and fail the job if it is not SUCCESS. Set false only for fire-and-forget deploys."
        required: false
        default: true
        type: boolean
      deploy-timeout-minutes:
        description: "How long to wait for the deployment to become healthy before failing"
        required: false
        default: 15
        type: number
    secrets:
      RAILWAY_TOKEN:
        required: true

jobs:
  test:
    if: inputs.run-tests
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup throws "Multiple versions of pnpm specified" when the `version`
      # input AND package.json's `packageManager` field are both set and disagree — e.g.
      # `pnpm@10.29.3` vs this workflow's default input of "10". That killed the TEST job
      # before install, so the deploy job was skipped entirely, on every fleet repo that
      # pins packageManager (conduit, cornerstone, hea-partner, hea-fulfillment,
      # aws-operations, yourfds). Railway's own GitHub integration kept deploying those
      # apps independently, which is why the apps shipped while this gate silently never ran.
      #
      # packageManager is the exact pin and must win. But the action ALSO errors ("No pnpm
      # version is specified") when neither is given, and several fleet repos have no
      # packageManager field, so `version` cannot simply be dropped. Pass it only when the
      # repo does not pin one: an empty `version` makes the action read packageManager.
      - name: Resolve pnpm version source
        if: inputs.package-manager == 'pnpm'
        id: pnpm-src
        shell: bash
        run: |
          if grep -qE '"packageManager"[[:space:]]*:[[:space:]]*"pnpm@' package.json 2>/dev/null; then
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.pnpm-version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: inputs.package-manager == 'pnpm'
        with:
          version: ${{ steps.pnpm-src.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}

      - name: Run tests
        run: ${{ inputs.test-command }}

  deploy:
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Deploy, then WAIT for the deployment to actually become healthy.
      #
      # This used to be `railway up --detach`, which returns as soon as the upload succeeds and
      # never looks at the outcome — so the job went green even when the deploy then failed.
      # That is not hypothetical: liveintentionally's dashboard build failed on EVERY deploy
      # from 2026-07-05 to 07-12, and every one of those runs was reported successful. The
      # service served a stale image for a week and nothing surfaced it.
      #
      # Two distinct failures have to be caught, and they fail at different stages:
      #   1. BUILD failure   — `--ci` streams build logs and waits for the build.
      #   2. RUNTIME crash   — the image builds fine but the container dies on boot (typically a
      #                        missing required env var). Railway marks this CRASHED *after* the
      #                        build succeeds, so waiting for the build alone is not enough.
      # Hence: build wait + poll to a terminal deployment state.
      - name: Deploy to Railway
        timeout-minutes: ${{ inputs.deploy-timeout-minutes }}
        run: |
          set -euo pipefail
          # $ARGS is intentionally unquoted below: it is a flag list that must word-split.
          # shellcheck disable=SC2086

          if [ -n "${{ inputs.project-id }}" ]; then
            export RAILWAY_API_TOKEN="$DEPLOY_TOKEN"
            ARGS="--project ${{ inputs.project-id }} --service ${{ inputs.service-name }} --environment ${{ inputs.environment }}"
          else
            export RAILWAY_TOKEN="$DEPLOY_TOKEN"
            ARGS="--service ${{ inputs.service-name }}"
          fi

          latest_field() {
            # $1 = field name. Reads the newest deployment via JSON; no jq dependency.
            railway deployment list $ARGS --limit 1 --json 2>/dev/null \
              | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d)[0]?.$1 ?? '')}catch{console.log('')}})"
          }

          # Remember the deployment that is current BEFORE we deploy. Without this, the poll
          # below could read the PREVIOUS deployment's SUCCESS and pass while ours is still
          # building — exactly the false-green this change exists to remove.
          PREV_ID="$(latest_field id)"
          echo "previous deployment: ${PREV_ID:-none}"

          railway up $ARGS --ci

          if [ "${{ inputs.wait-for-deploy }}" != "true" ]; then
            echo "::warning::wait-for-deploy is false — not verifying that this deploy went live."
            exit 0
          fi

          echo "Waiting for the new deployment to reach a terminal state..."

          while true; do
            ID="$(latest_field id)"
            STATUS="$(latest_field status)"

            # Don't grade the deployment we replaced.
            if [ -z "$ID" ] || [ "$ID" = "$PREV_ID" ]; then
              echo "  waiting for the new deployment to register..."
              sleep 5
              continue
            fi

            case "$STATUS" in
              SUCCESS)
                echo "::notice::Railway deployment SUCCESS for ${{ inputs.service-name }} ($ID)"
                exit 0
                ;;
              FAILED|CRASHED)
                echo "::error::Railway deployment $STATUS for ${{ inputs.service-name }} ($ID)"
                echo "CRASHED usually means the image built but the container died on boot —"
                echo "most often a missing or invalid required environment variable."
                echo "--- build logs (tail) ---"
                railway logs "$ID" --build $ARGS 2>/dev/null | tail -50 || true
                echo "--- runtime logs (tail) ---"
                railway logs "$ID" $ARGS 2>/dev/null | tail -50 || true
                exit 1
                ;;
              REMOVED|SKIPPED)
                echo "::error::Deployment ended as $STATUS — cannot confirm this deploy went live."
                exit 1
                ;;
              *)
                echo "  status=$STATUS ..."
                sleep 10
                ;;
            esac
          done
        env:
          DEPLOY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
