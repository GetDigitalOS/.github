name: Deploy to Railway

on:
  workflow_call:
    inputs:
      service-name:
        description: "Railway service name"
        required: true
        type: string
      project-id:
        description: "Railway project ID. Set this to deploy with a workspace-scoped RAILWAY_TOKEN; leave empty to use a project-scoped token (legacy)."
        required: false
        default: ""
        type: string
      environment:
        description: "Railway environment (only used when project-id is set)"
        required: false
        default: "production"
        type: string
      node-version:
        description: "Node.js version"
        required: false
        default: "22"
        type: string
      package-manager:
        description: "Package manager: npm or pnpm"
        required: false
        default: "npm"
        type: string
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        required: false
        default: "10"
        type: string
      run-tests:
        description: "Run tests before deploy"
        required: false
        default: true
        type: boolean
      test-command:
        description: "Test command"
        required: false
        default: "npm test"
        type: string
      wait-for-deploy:
        description: "Wait for the Railway deployment to reach a terminal state and fail the job if it is not SUCCESS. Set false only for fire-and-forget deploys."
        required: false
        default: true
        type: boolean
      deploy-timeout-minutes:
        description: "How long to wait for the deployment to reach a terminal state before failing as unverified"
        required: false
        default: 15
        type: number

      # ── Layer 2: deployed-artifact provenance (OPT-IN) ──
      #
      # Only for projects that expose a build-identity endpoint. Leave empty and
      # the workflow still fixes the outcome binding (Layer 1) for everyone else —
      # this must not pretend every project already publishes provenance.
      verify-url:
        description: "Layer 2 (optional): URL of a build-identity endpoint. Must return JSON {buildSha, identified}. Empty = skip provenance verification."
        required: false
        default: ""
        type: string
      verify-expected-sha:
        description: "Layer 2: the commit SHA that SHOULD be running. Defaults to the SHA that triggered this run."
        required: false
        default: ""
        type: string
      verify-timeout-seconds:
        description: "Layer 2: how long to let the new build replace the old one at verify-url before failing"
        required: false
        default: 180
        type: number
    secrets:
      RAILWAY_TOKEN:
        required: true

jobs:
  test:
    if: inputs.run-tests
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup throws "Multiple versions of pnpm specified" when the `version`
      # input AND package.json's `packageManager` field are both set and disagree — e.g.
      # `pnpm@10.29.3` vs this workflow's default input of "10". That killed the TEST job
      # before install, so the deploy job was skipped entirely, on every fleet repo that
      # pins packageManager (conduit, cornerstone, hea-partner, hea-fulfillment,
      # aws-operations, yourfds). Railway's own GitHub integration kept deploying those
      # apps independently, which is why the apps shipped while this gate silently never ran.
      #
      # packageManager is the exact pin and must win. But the action ALSO errors ("No pnpm
      # version is specified") when neither is given, and several fleet repos have no
      # packageManager field, so `version` cannot simply be dropped. Pass it only when the
      # repo does not pin one: an empty `version` makes the action read packageManager.
      - name: Resolve pnpm version source
        if: inputs.package-manager == 'pnpm'
        id: pnpm-src
        shell: bash
        run: |
          if grep -qE '"packageManager"[[:space:]]*:[[:space:]]*"pnpm@' package.json 2>/dev/null; then
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.pnpm-version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: inputs.package-manager == 'pnpm'
        with:
          version: ${{ steps.pnpm-src.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}

      - name: Run tests
        run: ${{ inputs.test-command }}

  deploy:
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Stamp the commit into the SOURCE, because it cannot be stamped into the BUILD.
      #
      # `railway up` uploads this directory and Railway builds the image on its own
      # builders. The CLI has no `--build-arg`, so a Dockerfile `ARG GIT_SHA` can
      # never be supplied and would silently keep its default forever — which is
      # exactly the false-provenance this whole change exists to prevent. (Railway
      # does expose service *variables* as build args, but keeping one current would
      # mean writing a variable on every deploy, and a variable write itself triggers
      # a redeploy. That is a loop, not a mechanism.)
      #
      # So: write the SHA into a file that the upload carries. A project opts in by
      # COPYing `.build-sha` in its Dockerfile and reading it at runtime. Projects
      # that do not are unaffected — the file is simply ignored.
      #
      # Harmless when unused; load-bearing when used.
      - name: Stamp build provenance into the upload
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ github.sha }}" > .build-sha
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .build-time
          echo "stamped .build-sha = $(cat .build-sha)"

      # ─────────────────────────────────────────────────────────────────────────
      # LAYER 1 — Authoritative Railway outcome binding.
      #
      # The job's conclusion must correspond to DEPLOYMENT TRUTH. It has failed to
      # in both directions, and each direction had a different cause:
      #
      #   GREEN WHEN IT FAILED. `railway up --detach` returned on upload and never
      #   looked at the outcome. liveintentionally's dashboard build failed on EVERY
      #   deploy 2026-07-05..07-12; all runs reported success; the service served a
      #   stale image for a week. Fixed earlier by polling to a terminal state.
      #
      #   RED WHEN IT SHIPPED. audit-runner run 29258866994 (2026-07-13): `railway up
      #   --ci` uploaded, Railway built and started deployment 60c8bd86, and then the
      #   CLI hit "Failed to stream build logs" and exited 1. Under `set -e` the script
      #   died there and NEVER REACHED THE POLL. The job went red while the deployment
      #   went live — and the poll, the one thing that knew the truth, was unreachable
      #   precisely because the CLI stumbled.
      #
      # THE RULE THIS ENCODES:
      #   The CLI is a TRANSPORT. Railway's deployment state is the AUTHORITY.
      #   A non-zero exit from `railway up` means "state unknown — go ask Railway."
      #   It NEVER means "the deploy failed." Only Railway's terminal state decides.
      #
      # We still have to catch a genuine upload failure, which looks the same at the
      # exit code and differs only in its consequence: no new deployment ever
      # registers. So a non-zero exit is escalated to failure ONLY if no new
      # deployment appears within a grace window.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Deploy to Railway (authoritative outcome)
        id: deploy
        # ERREXIT IS ON HERE AND CANNOT BE TURNED OFF BY THE SCRIPT.
        #
        # `shell: bash` is not `/bin/bash script`. GitHub expands it to
        #     bash --noprofile --norc -eo pipefail {0}
        # so `-e` is set on the SHELL INVOCATION, before line 1 runs. An earlier
        # version of this step carried `set -uo pipefail` under a comment claiming
        # it was "deliberately not -e" — but `set -uo pipefail` only ADDS `-u` and
        # `-o pipefail`. It never clears `-e`. The comment described an intent the
        # shell did not implement, and the step died on the first non-zero command:
        # audit-runner run 29292062216, where `railway up` uploaded fine, then its
        # log-stream GraphQL call timed out and it exited 1. The shell died on that
        # line — before UP_EXIT, before the warning, before the poll. The step whose
        # entire job is to go ask Railway what really happened never asked, and the
        # job went red over a deployment Railway had already marked SUCCESS.
        #
        # We keep `-e` (an unexpected failure SHOULD abort) and instead scope the
        # exception to each command whose non-zero exit is INFORMATION, not failure:
        #   * `railway up`      -> its exit code is a transport signal; see below.
        #   * `latest_field`    -> a CLI/network hiccup while READING state must not
        #                          be fatal; it returns "" and the callers handle "".
        #                          (`-o pipefail` makes its pipeline fail if the CLI
        #                          fails, so this needs the guard even though `node`
        #                          itself always exits 0.)
        shell: bash
        run: |
          set -uo pipefail
          # $ARGS is intentionally unquoted below: it is a flag list that must word-split.
          # shellcheck disable=SC2086

          if [ -n "${{ inputs.project-id }}" ]; then
            export RAILWAY_API_TOKEN="$DEPLOY_TOKEN"
            ARGS="--project ${{ inputs.project-id }} --service ${{ inputs.service-name }} --environment ${{ inputs.environment }}"
          else
            export RAILWAY_TOKEN="$DEPLOY_TOKEN"
            ARGS="--service ${{ inputs.service-name }}"
          fi

          # Reads a field off the newest deployment. `$1` is a JS expression against
          # the deployment object, so nested reads work (e.g. `meta?.imageDigest`).
          #
          # `|| true` is load-bearing under `-e` + `-o pipefail`: a transient CLI or
          # network error here would otherwise kill the step from inside a command
          # substitution — i.e. reading the state would fail the deploy. Absence of
          # an answer is reported as "" and every caller already handles "".
          latest_field() {
            { railway deployment list $ARGS --limit 1 --json 2>/dev/null || true; } \
              | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const x=JSON.parse(d)[0];console.log((x&&(x.$1))??'')}catch{console.log('')}})"
          }

          emit() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }
          finish() {  # $1=outcome $2=exit
            emit outcome "$1"
            emit deployment-id "${ID:-}"
            emit image-digest "${DIGEST:-}"
            emit final-state "${STATUS:-unknown}"
            echo "── deploy summary ──────────────────────────────"
            echo "  service        : ${{ inputs.service-name }}"
            echo "  deployment id  : ${ID:-none}"
            echo "  image digest   : ${DIGEST:-unavailable}"
            echo "  final state    : ${STATUS:-unknown}"
            echo "  outcome        : $1"
            echo "────────────────────────────────────────────────"
            exit "$2"
          }

          # Remember the deployment that is current BEFORE we deploy. Without this the
          # poll could read the PREVIOUS deployment's SUCCESS and pass while ours is
          # still building — a false green of exactly the kind this exists to remove.
          PREV_ID="$(latest_field id)"
          echo "previous deployment: ${PREV_ID:-none}"

          # Command-scoped errexit exception. `|| UP_EXIT=$?` both CAPTURES the exit
          # code and marks the command as handled, so `-e` does not fire. Writing
          # `railway up ...` on its own line and reading `$?` on the next CANNOT
          # work under `-e`: the shell is already gone by then.
          UP_EXIT=0
          railway up $ARGS --ci || UP_EXIT=$?

          if [ "$UP_EXIT" -ne 0 ]; then
            echo "::warning::\`railway up\` exited $UP_EXIT. This is NOT authoritative — it conflates a"
            echo "::warning::failed deploy with a failed LOG STREAM. Asking Railway what actually happened."
          fi

          if [ "${{ inputs.wait-for-deploy }}" != "true" ]; then
            echo "::warning::wait-for-deploy is false — not verifying that this deploy went live."
            ID="$(latest_field id)"; STATUS="not-verified"
            finish fire-and-forget 0
          fi

          # A genuine upload failure and a log-stream hiccup are indistinguishable by
          # exit code; they differ in whether a NEW deployment ever registers.
          REGISTER_GRACE=120
          DEADLINE=$(( SECONDS + ${{ inputs.deploy-timeout-minutes }} * 60 ))
          REGISTER_BY=$(( SECONDS + REGISTER_GRACE ))

          echo "Waiting for the new deployment to reach a terminal state..."
          while true; do
            ID="$(latest_field id)"
            STATUS="$(latest_field status)"
            DIGEST="$(latest_field 'meta?.imageDigest')"

            if [ -z "$ID" ] || [ "$ID" = "$PREV_ID" ]; then
              if [ "$SECONDS" -ge "$REGISTER_BY" ]; then
                if [ "$UP_EXIT" -ne 0 ]; then
                  echo "::error::UPLOAD FAILED — \`railway up\` exited $UP_EXIT and no new deployment"
                  echo "::error::registered within ${REGISTER_GRACE}s. Nothing was handed to Railway."
                  STATUS="none"; finish upload-failed 1
                fi
                echo "::error::\`railway up\` succeeded but no new deployment registered within ${REGISTER_GRACE}s."
                STATUS="none"; finish no-deployment-registered 1
              fi
              echo "  waiting for the new deployment to register..."
              sleep 5
              continue
            fi

            case "$STATUS" in
              SUCCESS)
                echo "::notice::Railway deployment SUCCESS for ${{ inputs.service-name }} ($ID)"
                finish success 0
                ;;
              FAILED|CRASHED)
                echo "::error::Railway deployment $STATUS for ${{ inputs.service-name }} ($ID)"
                echo "CRASHED usually means the image built but the container died on boot —"
                echo "most often a missing or invalid required environment variable."
                echo "--- build logs (tail) ---"
                railway logs "$ID" --build $ARGS 2>/dev/null | tail -50 || true
                echo "--- runtime logs (tail) ---"
                railway logs "$ID" $ARGS 2>/dev/null | tail -50 || true
                finish deploy-failed 1
                ;;
              REMOVED|SKIPPED)
                echo "::error::Deployment ended as $STATUS — cannot confirm this deploy went live."
                finish deploy-removed 1
                ;;
              *)
                if [ "$SECONDS" -ge "$DEADLINE" ]; then
                  # UNVERIFIED, not "failed". The deployment may well be fine — we simply
                  # ran out of patience, and saying "failed" would be a claim we cannot
                  # support. Naming it precisely is the whole point of this workflow.
                  echo "::error::VERIFICATION TIMEOUT after ${{ inputs.deploy-timeout-minutes }}m."
                  echo "::error::Deployment $ID is still '$STATUS'. This deploy is UNVERIFIED —"
                  echo "::error::it may yet succeed. Check Railway before assuming it failed."
                  finish verification-timeout 1
                fi
                echo "  status=$STATUS ..."
                sleep 10
                ;;
            esac
          done
        env:
          DEPLOY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ─────────────────────────────────────────────────────────────────────────
      # LAYER 2 — Deployed-artifact provenance (opt-in).
      #
      # Layer 1 proves RAILWAY thinks the deployment succeeded. It does not prove
      # WHICH CODE is running: Railway deploys here via a `railway up` CLI upload,
      # not a repo-linked build, so Railway records an image digest and NO commit.
      # Without this layer, "what is deployed?" can only be inferred from timing.
      #
      # Contract (opt in by setting verify-url):
      #   GET <verify-url> -> {"buildSha": "<full sha>", "identified": true}
      #
      # We COMPARE the SHA we intended to ship against the SHA the service reports.
      # Confirming that both values merely exist proves nothing.
      #
      # `identified: false` / `buildSha: "unknown"` is a FAILURE, never a pass — it
      # is the artifact saying it cannot identify itself, and treating that as OK
      # would let "unknown" silently satisfy the gate it exists to trip.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Verify the deployed artifact reports the expected commit
        if: inputs.verify-url != ''
        shell: bash
        env:
          VERIFY_URL: ${{ inputs.verify-url }}
          EXPECTED_SHA: ${{ inputs.verify-expected-sha != '' && inputs.verify-expected-sha || github.sha }}
          TIMEOUT_S: ${{ inputs.verify-timeout-seconds }}
        run: |
          set -uo pipefail

          echo "expected commit : $EXPECTED_SHA"
          echo "verifying at    : $VERIFY_URL"

          DEADLINE=$(( SECONDS + TIMEOUT_S ))
          LAST=""

          # Railway can report SUCCESS a moment before the new container is the one
          # answering, so poll rather than sampling once — a single read can catch
          # the OLD build still serving and report a mismatch that is really a race.
          #
          # `|| true` is load-bearing, for the same reason as `latest_field` above:
          # `-e` is ON (GitHub's `shell: bash` = `bash --noprofile --norc -eo pipefail`),
          # and a failed command substitution in an assignment takes the assignment's
          # exit status with it. Without the guard, the FIRST refused connection —
          # exactly what a container swap produces, and exactly what this loop exists
          # to ride out — would kill the step instantly, with none of the diagnostics
          # below ever printing and no retry. The poll would not poll.
          #
          # An empty BODY is the "no answer yet" case and is handled: we fall through
          # to the deadline check, which distinguishes "never answered" from
          # "answered with the wrong SHA". That distinction is the point of the step.
          while true; do
            BODY="$(curl -fsS --max-time 10 -H 'Cache-Control: no-cache' "$VERIFY_URL" 2>/dev/null || true)"

            if [ -n "$BODY" ]; then
              RUNNING="$(node -e "try{const j=JSON.parse(process.argv[1]);console.log(j.buildSha??'')}catch{console.log('')}" "$BODY")"
              IDENT="$(node -e "try{const j=JSON.parse(process.argv[1]);console.log(j.identified===true?'true':'false')}catch{console.log('false')}" "$BODY")"
              LAST="$RUNNING"

              if [ "$IDENT" = "true" ] && [ "$RUNNING" = "$EXPECTED_SHA" ]; then
                echo "::notice::PROVENANCE VERIFIED — ${{ inputs.service-name }} is running $EXPECTED_SHA"
                exit 0
              fi

              if [ "$IDENT" != "true" ]; then
                echo "::error::The deployed artifact CANNOT IDENTIFY ITSELF (identified=false, buildSha='${RUNNING:-unknown}')."
                echo "::error::This is a failure, not a pass. The image was built without a commit stamp,"
                echo "::error::so no deploy of it can ever be verified. Check the Dockerfile's GIT_SHA build arg."
                exit 1
              fi
            fi

            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              if [ -z "$BODY" ]; then
                echo "::error::No response from $VERIFY_URL within ${TIMEOUT_S}s."
                echo "::error::Either the endpoint does not exist, or the service is not serving."
              else
                echo "::error::REVISION MISMATCH — expected $EXPECTED_SHA, but the running service"
                echo "::error::reports ${LAST:-<none>} after ${TIMEOUT_S}s."
                echo "::error::Railway called the deployment successful, yet the OLD code is still serving."
                echo "::error::This is exactly the failure Layer 1 alone cannot see."
              fi
              exit 1
            fi

            echo "  running=${LAST:-<no response>} (want $EXPECTED_SHA) ..."
            sleep 5
          done
