name: Runner workspace ownership guard
description: >-
  Preflight and restore the OWNERSHIP invariant of a self-hosted runner's reusable host
  workspace. Exists because a root `container:` job and a non-root host job in the same repo
  share one `_work/<repo>/<repo>` directory, and the root one poisons it.

# ---------------------------------------------------------------------------
# WHY THIS EXISTS  (aws-operations, 2026-06-21 -> 2026-07-14: every Deploy failed)
#
# GitHub bind-mounts the runner's ENTIRE reusable `_work` tree into a `container:` job
# (`-v /home/<user>/actions-runner/_work:/__w`) and runs that container as ROOT, with no uid
# remapping. So `actions/checkout` inside a container job writes the repository workspace
# onto the HOST filesystem owned by `root:root`.
#
# A non-container job in the SAME repo (e.g. Deploy) runs on the host as the runner service
# user and reuses the SAME workspace directory. It cannot write into a root-owned `.git/`, so
# checkout cannot even CREATE `.git/index.lock`, and its "recreate the repository" fallback
# cannot `rmdir` the root-owned tree either:
#
#   fatal: Unable to create '.../.git/index.lock': Permission denied
#   File was unable to be removed  Error: EACCES: permission denied, rmdir '.../.claude/agents'
#
# Note what that error is NOT. There is no stale lock. Git is failing to *create* the lock,
# because creating a file needs write permission on the PARENT directory. The word "lock" is a
# red herring, and so is whichever path the rmdir names (simply the first entry the recursive
# delete could not remove).
#
# The corruption is INVISIBLE to the job that causes it: the container runs as root, and root
# can overwrite root-owned files. CI stayed green for three weeks while every Deploy died.
#
# ---------------------------------------------------------------------------
# WHY RESTORE IS A `post:` STEP AND NOT A NORMAL `if: always()` STEP
#
# It was a normal step first. It did not work, and the selftest caught it.
#
# Action POST-steps run AFTER every main step, in reverse order. `actions/checkout` has a post
# step that rewrites `.git/config` (to unset the auth header) — and in a container job it does
# that AS ROOT. So an `if: always()` restore placed among the main steps runs too early, and
# checkout's post step re-poisons exactly one path behind it:
#
#   0:0 -rw-r--r-- .../runner-selftest/.git/config
#
# One root-owned file is all it takes: the next host job's checkout dies again.
#
# Because post-steps run in REVERSE order, an action invoked EARLY has its post run LATE. So
# `mode: restore` must be the FIRST step of the container job — then its post runs after
# checkout's post, and the workspace is genuinely clean when the job ends.
# ---------------------------------------------------------------------------

inputs:
  mode:
    description: >-
      "preflight" — run as an early step of a NON-container job; fails closed if the reusable
      workspace is already poisoned, with actionable evidence, instead of letting
      actions/checkout report a misleading "index.lock: Permission denied".
      "restore" — put this FIRST in a root container job. It does nothing up front; the work
      happens in the action's post step, which runs after every other post step (including
      checkout's) and chowns the host workspace back.
    required: true
  owner-uid:
    description: >-
      Numeric uid the host workspace must be owned by — the runner SERVICE user, not whoever
      runs this step. Numeric on purpose: inside a container the host uid may not resolve to
      any name at all.
    required: false
    default: '1000'
  owner-gid:
    description: 'Numeric gid the host workspace must be owned by.'
    required: false
    default: '1000'
  extra-paths:
    description: >-
      Optional newline- or comma-separated extra paths to guard/restore — e.g. a shared package
      store a root container also writes, such as /__w/.pnpm-store. Missing paths are skipped,
      not an error.
    required: false
    default: ''

runs:
  using: node20
  main: index.js
  post: post.js
  # Restore MUST run even when the job failed — a failed job that leaves the workspace
  # root-owned breaks the NEXT job just as thoroughly as a successful one.
  post-if: always()
